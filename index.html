<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Continuum Gallery</title>
    <link rel="icon" href="data:," />
    <link rel="stylesheet" href="styles.css?v=20260606-monet-klein-v1" />
    <script async defer src="https://accounts.google.com/gsi/client"></script>
    <script defer src="app.js?v=20260606-monet-klein-v1"></script>
  </head>
  <body data-mode="waterfall">
    <div class="app" id="app">
      <header class="topbar">
        <div class="brand">
          <span class="brand-mark" aria-hidden="true"></span>
          <div>
            <strong>Continuum Gallery</strong>
            <span id="modeLabel">瀑布流</span>
          </div>
        </div>
        <div class="top-actions">
          <button class="google-button" id="googleButton" type="button" aria-label="导入 Google Photos">
            <span aria-hidden="true">G</span>
            <strong>Photos</strong>
          </button>
          <button class="icon-button gesture-button" id="gestureButton" type="button" aria-label="启用手势切换" title="手势切换">
            <span aria-hidden="true">手</span>
          </button>
          <button class="icon-button" id="focusButton" type="button" aria-label="聚焦当前照片" title="聚焦">
            <span aria-hidden="true">◎</span>
          </button>
        </div>
      </header>

      <main class="stage" id="stage" tabindex="0" aria-label="图片展示区">
        <canvas class="particle-canvas" id="particleCanvas" aria-hidden="true"></canvas>
        <canvas class="grain-canvas" id="grainCanvas" aria-hidden="true"></canvas>
        <video class="gesture-video" id="gestureVideo" playsinline muted aria-hidden="true"></video>
        <div class="gallery" id="gallery"></div>
        <div class="mode-toast" id="modeToast">瀑布流</div>
      </main>

      <nav class="bottom-bar" aria-label="展示模式">
        <div class="segmented" id="modeButtons">
          <button type="button" data-mode="waterfall" aria-pressed="true">
            <span class="mode-icon mode-icon-waterfall" aria-hidden="true"></span>
            <span>瀑布</span>
          </button>
          <button type="button" data-mode="orbit" aria-pressed="false">
            <span class="mode-icon mode-icon-orbit" aria-hidden="true"></span>
            <span>滑动</span>
          </button>
          <button type="button" data-mode="sphere" aria-pressed="false">
            <span class="mode-icon mode-icon-sphere" aria-hidden="true"></span>
            <span>粒子</span>
          </button>
        </div>
        <button class="immersive-button" id="immersiveButton" type="button">沉浸</button>
      </nav>

      <section class="photos-panel" id="photosPanel" aria-hidden="true" aria-label="Google Photos">
        <div class="panel-header">
          <strong>Google Photos</strong>
          <button type="button" id="photosPanelClose" aria-label="关闭">×</button>
        </div>
        <label class="client-field">
          <span>Client ID</span>
          <input id="googleClientId" autocomplete="off" spellcheck="false" placeholder="*.apps.googleusercontent.com" />
        </label>
        <div class="setup-links" aria-label="Google Cloud setup">
          <a href="https://console.cloud.google.com/apis/library/photospicker.googleapis.com" target="_blank" rel="noopener" title="Open Google Photos Picker API">API</a>
          <a href="https://console.cloud.google.com/apis/credentials" target="_blank" rel="noopener" title="Open OAuth credentials">OAuth</a>
          <button type="button" id="copyOriginButton" title="Copy authorized JavaScript origin">Origin</button>
        </div>
        <div class="panel-actions">
          <button type="button" id="saveClientButton">保存</button>
          <button type="button" id="importPhotosButton">选择照片</button>
        </div>
        <output class="photos-status" id="photosStatus"></output>
      </section>

      <section class="viewer" id="viewer" aria-hidden="true" aria-label="单图观赏">
        <button class="viewer-close" id="viewerClose" type="button" aria-label="关闭单图观赏" title="关闭">×</button>
        <div class="viewer-tools" aria-label="Image zoom controls">
          <button id="viewerZoomOut" type="button" aria-label="Zoom out" title="Zoom out">-</button>
          <button id="viewerZoomReset" type="button" aria-label="Reset zoom" title="Reset zoom">100%</button>
          <button id="viewerZoomIn" type="button" aria-label="Zoom in" title="Zoom in">+</button>
        </div>
        <figure class="viewer-frame" id="viewerFrame">
          <div class="viewer-image-stage" id="viewerImageStage">
            <img id="viewerImage" alt="" />
          </div>
          <figcaption>
            <strong id="viewerTitle"></strong>
            <span id="viewerMeta"></span>
          </figcaption>
        </figure>
      </section>
    </div>
  </body>
</html>
